<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Incident | BC Wild Watch</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="flex items-center justify-between border-b px-6 py-4 lg:px-20 bg-white sticky top-0 z-50">
    <a href="index.html" class="flex items-center gap-4">
      <img src="media/images/logo.jpg" class="h-10 w-10 rounded-lg" alt="">
      <span class="text-xl font-bold">BC Wild Watch</span>
    </a>

    <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="sighting.html">Sighting Report</a>
      <a href="incident.html" class="text-[#e60a18]">Incident Report</a>
      <a href="predictor.html">Safety Scanner</a>
    </nav>

    <div class="hidden md:flex items-center gap-4">
      <a href="contact.html" class="bg-[#e60a18] text-white px-5 py-2 rounded-lg font-bold text-sm">Emergency Alert</a>
      <div data-auth-slot></div>
    </div>

    <button data-menu-toggle class="md:hidden">
      <i data-lucide="menu"></i>
    </button>
  </header>

  <div data-mobile-menu class="hidden md:hidden bg-white border-b p-6 flex flex-col gap-4 font-bold">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="sighting.html">Sighting Report</a>
    <a href="incident.html">Incident Report</a>
    <a href="predictor.html">Safety Scanner</a>
    <div data-mobile-auth-slot></div>
  </div>

  <main class="flex justify-center py-12 px-6 lg:px-20">
    <div class="w-full max-w-4xl">
      <div data-flash hidden></div>

      <div class="bg-black text-white rounded-t-2xl border-b-8 border-[#e60a18] px-8 py-10 mb-12 flex items-center justify-between">
        <div>
          <h1 class="text-4xl md:text-6xl font-black tracking-tight">EMERGENCY INCIDENT</h1>
          <p class="mt-4 text-[#ff1f2d] font-black uppercase tracking-[0.25em] text-sm">
            Priority One: Immediate Response Required
          </p>
        </div>
        <div class="hidden md:flex w-20 h-20 rounded-2xl border border-[#ff1f2d] items-center justify-center">
          <i data-lucide="triangle-alert" class="w-10 h-10 text-[#ff1f2d]"></i>
        </div>
      </div>

      <form data-incident-form class="bg-white p-8 md:p-12 rounded-2xl shadow-xl border border-slate-100 space-y-10">
        <div>
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Visual Evidence</label>

          <label for="incidentMedia" class="mt-3 border-2 border-dashed border-slate-100 bg-slate-50 rounded-3xl p-10 text-center text-slate-400 font-bold cursor-pointer block hover:bg-slate-100 transition">
            <i data-lucide="camera" class="w-10 h-10 mx-auto mb-3"></i>
            <span id="incidentMediaLabel">Attach Media</span>
          </label>

          <input
            id="incidentMedia"
            name="incident_media"
            type="file"
            accept="image/*,video/*"
            class="hidden"
          >
        </div>

        <div class="grid md:grid-cols-2 gap-8">
          <div>
            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Location</label>
            <input
              name="location"
              class="mt-3 w-full h-14 px-5 rounded-2xl border border-slate-100 bg-slate-50 font-bold"
              placeholder="Campus Area / Block"
              required
            >
          </div>

          <div>
            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Urgency Level</label>
            <select
              name="urgency"
              class="mt-3 w-full h-14 px-5 rounded-2xl border border-slate-100 bg-slate-50 font-bold"
              required
            >
              <option value="">Select urgency</option>
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
        </div>

        <div>
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Date and Time</label>
          <input
            name="date_time"
            type="datetime-local"
            class="mt-3 w-full h-14 px-5 rounded-2xl border border-slate-100 bg-slate-50 font-bold"
            required
          >
        </div>

        <div>
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Situation Description</label>
          <textarea
            name="situation_description"
            rows="5"
            class="mt-3 w-full p-6 rounded-3xl border border-slate-100 bg-slate-50 font-bold"
            placeholder="Describe what happened and what immediate danger is present..."
            required
          ></textarea>
        </div>

        <button type="submit" class="w-full bg-[#e60a18] text-white py-5 rounded-2xl font-black uppercase tracking-widest text-sm hover:bg-black">
          Submit Emergency Incident
        </button>
      </form>
    </div>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
