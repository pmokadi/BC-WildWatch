<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | BC Wild Watch</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="min-h-screen flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-xl space-y-8">
      <div class="text-center">
        <a href="index.html">
          <img src="media/images/logo.jpg" class="inline-flex w-16 h-16 rounded-2xl mb-6" alt="">
        </a>
        <h1 class="text-3xl font-black">Create Student Account</h1>
        <p class="mt-2 text-slate-600">Join the Belgium Campus Wildlife Monitoring Network</p>
      </div>

      <div data-flash hidden></div>

      <div class="bg-white p-8 md:p-10 rounded-lg shadow-sm border border-slate-200 space-y-8">
        <button
          type="button"
          onclick="location.href='microsoft-signup.html'"
          class="w-full flex items-center justify-center gap-3 border border-slate-200 py-4 rounded-xl font-bold hover:bg-slate-50"
        >
          <img src="https://www.microsoft.com/favicon.ico" class="w-5 h-5" alt="Microsoft Logo">
          Sign up with Microsoft
        </button>

        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-slate-200"></div>
          </div>
          <div class="relative flex justify-center text-xs uppercase">
            <span class="bg-white px-2 text-slate-500 font-bold">Or register with email</span>
          </div>
        </div>

        <form data-signup-form class="grid md:grid-cols-2 gap-6">
          <div class="md:col-span-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-500">Full Name</label>
            <input
              name="full_name"
              type="text"
              class="mt-2 w-full px-4 py-3 rounded-xl border bg-slate-50"
              placeholder="Enter your full name"
              required
            >
          </div>

          <div class="md:col-span-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-500">Student Email</label>
            <input
              name="email"
              type="email"
              class="mt-2 w-full px-4 py-3 rounded-xl border bg-slate-50"
              placeholder="student@belgiumcampus.ac.za"
              required
            >
          </div>

          <div>
            <label class="text-xs font-bold uppercase tracking-widest text-slate-500">Password</label>
            <input
              name="password"
              type="password"
              class="mt-2 w-full px-4 py-3 rounded-xl border bg-slate-50"
              required
            >
          </div>

          <div>
            <label class="text-xs font-bold uppercase tracking-widest text-slate-500">Confirm Password</label>
            <input
              name="confirm_password"
              type="password"
              class="mt-2 w-full px-4 py-3 rounded-xl border bg-slate-50"
              required
            >
          </div>

          <label class="md:col-span-2 flex items-start gap-3 text-xs text-slate-500">
            <input type="checkbox" required class="mt-1">
            I agree to the Terms of Service and Privacy Policy.
          </label>

          <button class="md:col-span-2 w-full bg-[#e60a18] text-white py-4 rounded-xl font-black uppercase tracking-widest">
            Create Student Account
          </button>
        </form>
      </div>

      <p class="text-center text-sm text-slate-600">
        Already have an account?
        <a href="login.html" class="text-[#e60a18] font-bold">Sign In</a>
      </p>
    </div>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
