<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Student Login | BC Wild Watch</title><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>body{font-family:Inter,sans-serif}</style></head>
<body class="bg-slate-50 text-slate-900">
  <main class="min-h-screen flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-md space-y-8">
      <div class="text-center"><a href="index.html"><img src="media/images/logo.jpg" class="inline-flex w-16 h-16 rounded-2xl mb-6" alt=""></a><h1 class="text-3xl font-black">Student Login</h1><p class="mt-2 text-slate-600">Access the BC Wild Watch Network</p></div>
      <div data-flash hidden></div>
      <form data-login-form class="bg-white p-8 rounded-lg shadow-sm border border-slate-200 space-y-5">
        <div><label class="text-xs font-bold uppercase tracking-widest text-slate-500">Email Address</label><div class="relative mt-2"><i data-lucide="mail" class="absolute left-3 top-3.5 w-5 h-5 text-slate-400"></i><input name="email" type="email" class="w-full pl-10 pr-4 py-3 rounded-xl border bg-slate-50" placeholder="student@belgiumcampus.ac.za" required></div></div>
        <div><label class="text-xs font-bold uppercase tracking-widest text-slate-500">Password</label><div class="relative mt-2"><i data-lucide="lock" class="absolute left-3 top-3.5 w-5 h-5 text-slate-400"></i><input name="password" type="password" class="w-full pl-10 pr-4 py-3 rounded-xl border bg-slate-50" placeholder="Password" required></div></div>
        <button class="w-full bg-[#e60a18] text-white py-4 rounded-xl font-black uppercase tracking-widest">Sign In</button>
        <div class="relative">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
          <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-500 font-bold">Or continue with</span></div>
        </div>
        <button type="button" onclick="microsoftLogin()" class="w-full flex items-center justify-center gap-3 border py-4 rounded-xl font-bold hover:bg-slate-50">
          <img src="https://www.microsoft.com/favicon.ico" class="w-5 h-5" alt="Microsoft Logo">Sign in with Microsoft
        </button>
      </form>
      <p class="text-center text-sm text-slate-600">Don't have an account? <a href="signup.html" class="text-[#e60a18] font-bold">Create Student Account</a></p>
    </div>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>
