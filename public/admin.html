<!-- Admin Login Page for BC Wild Watch -->
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Character encoding and viewport configuration for responsive design -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | BC Wild Watch</title>
  
  <!-- Tailwind CSS framework for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts - Inter font family with multiple weights -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Inline styles to set default font family -->
  <style>body{font-family:Inter,sans-serif}</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center">
  <!-- Main container - centers login form on page -->
  <main class="w-full max-w-md p-8">
    <!-- Login card container with shadow and border styling -->
    <div class="bg-white p-8 rounded-xl shadow-lg border border-slate-100">
      <!-- Header section with logo and title -->
      <div class="text-center mb-6">
        <img src="media/images/logo.jpg" class="inline-flex w-16 h-16 rounded-2xl mb-4" alt="BC Wild Watch logo">
        <h1 class="text-2xl font-black">Admin Login</h1>
      </div>
      
      <!-- Descriptive text for the login form -->
      <p class="text-sm text-slate-600 mb-6">Enter your credentials to continue.</p>

      <!-- Admin login form with data-admin-form attribute for JavaScript targeting -->
      <form data-admin-form class="space-y-4">
        <!-- Username input field -->
        <div>
          <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Username</label>
          <input name="username" type="text" value="admin" class="w-full h-12 px-4 rounded-lg border border-slate-200 bg-slate-50" required>
        </div>

        <!-- Password input field with toggle visibility button -->
        <div>
          <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Password</label>
          <div class="relative">
            <input name="password" type="password" autocomplete="current-password" class="w-full h-12 px-4 rounded-lg border border-slate-200 bg-slate-50" required>
            <!-- Toggle button to show/hide password -->
            <button type="button" data-toggle class="absolute right-2 top-2.5 text-sm text-slate-500">Show</button>
          </div>
        </div>

        <!-- Submit button with BC Wild Watch brand color -->
        <div>
          <button type="submit" class="w-full bg-[#e60a18] text-white py-3 rounded-lg font-bold">Unlock Admin</button>
        </div>
      </form>

      <!-- Error message container (hidden by default, shown on login failure) -->
      <div data-admin-msg class="mt-4 text-sm text-red-600 hidden"></div>
    </div>
  </main>
  
  <!-- Main application script handling form submission and password toggle logic -->
  <script src="assets/js/app.js"></script>
</body>
</html>
