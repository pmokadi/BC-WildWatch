<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | BC Wild Watch</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,sans-serif}</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center">
  <main class="w-full max-w-md p-8">
    <div class="bg-white p-8 rounded-xl shadow-lg border border-slate-100">
      <h1 class="text-2xl font-black mb-4">Admin Login</h1>
      <p class="text-sm text-slate-600 mb-6">Enter the admin password to continue.</p>

      <form data-admin-form class="space-y-4">
        <div>
          <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Password</label>
          <div class="relative">
            <input name="password" type="password" autocomplete="current-password" class="w-full h-12 px-4 rounded-lg border border-slate-200 bg-slate-50" required>
            <button type="button" data-toggle class="absolute right-2 top-2.5 text-sm text-slate-500">Show</button>
          </div>
        </div>

        <div>
          <button type="submit" class="w-full bg-[#e60a18] text-white py-3 rounded-lg font-bold">Unlock Admin</button>
        </div>
      </form>

      <div data-admin-msg class="mt-4 text-sm text-red-600 hidden"></div>
    </div>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>
