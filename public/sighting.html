<!-- ============================================
     BC Wild Watch - Sighting Report Page
     Allows users to submit wildlife sightings
     ============================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta tags for character encoding and responsive design -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Sighting | BC Wild Watch</title>
  
  <!-- Tailwind CSS framework for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide icons for UI elements -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-slate-50 text-slate-900">
  <!-- Header section with navigation -->
  <header class="flex items-center justify-between border-b px-6 py-4 lg:px-20 bg-white sticky top-0 z-50">
    <a href="index.html" class="flex items-center gap-4">
      <img src="media/images/logo.jpg" class="w-16 h-16 rounded-full object-cover">
      <span class="font-black text-xl hidden sm:block">BC Wild Watch</span>
    </a>

    <!-- Desktop navigation menu -->
    <nav class="hidden md:flex gap-8 font-bold">
      <a href="index.html" class="hover:text-[#e60a18]">Home</a>
      <a href="about.html" class="hover:text-[#e60a18]">About</a>
      <a href="sighting.html" class="text-[#e60a18]">Report Sighting</a>
      <a href="gallery.html" class="hover:text-[#e60a18]">Gallery</a>
    </nav>

    <!-- Mobile menu toggle button -->
    <button data-menu-toggle class="md:hidden text-2xl">☰</button>
  </header>

  <!-- Mobile navigation menu (hidden by default) -->
  <div data-mobile-menu class="hidden md:hidden bg-white border-b p-6 flex flex-col gap-4 font-bold">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="sighting.html">Sighting Report</a>
    <a href="gallery.html">Gallery</a>
  </div>

  <!-- Main content area -->
  <main class="flex justify-center py-12 px-6 lg:px-20">
    <div class="w-full max-w-3xl">
      <!-- Flash messages container for notifications -->
      <div data-flash hidden></div>

      <!-- Page title and description -->
      <div class="mb-12">
        <div class="flex items-center gap-2 text-[#e60a18] mb-4">
          <i data-lucide="eye" class="w-5 h-5"></i>
          <span class="font-black uppercase tracking-[0.2em] text-[10px]">Citizen Science</span>
        </div>
        <h1 class="text-4xl font-black mb-4">Report a Sighting</h1>
        <p class="text-slate-500 leading-relaxed">Help us track wildlife across British Columbia. Submit your observations with as much detail as possible to contribute to our citizen science initiative.</p>
      </div>

      <!-- Sighting report form -->
      <form data-sighting-form class="bg-white p-8 md:p-12 rounded-lg shadow-xl border border-slate-100 space-y-8" enctype="multipart/form-data">
        
        <!-- Campus location and date fields -->
        <div class="grid md:grid-cols-2 gap-8">
          <div>
            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Campus Location</label>
            <select name="campus" class="mt-3 w-full h-14 px-5 rounded-2xl border border-slate-100 bg-slate-50 font-bold">
              <option value="Pretoria Campus">Pretoria Campus</option>
              <option value="Kempton Park Campus">Kempton Park Campus</option>
              <option value="Stellenbosch Campus">Stellenbosch Campus</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Date</label>
            <input name="date" type="date" class="mt-3 w-full h-14 px-5 rounded-2xl border border-slate-100 bg-slate-50 font-bold" required>
          </div>
        </div>

        <!-- Time and animal type fields -->
        <div class="grid md:grid-cols-2 gap-8">
          <div>
            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Time</label>
            <input name="time" type="time" class="mt-3 w-full h-14 px-5 rounded-2xl border border-slate-100 bg-slate-50 font-bold">
          </div>
          <div>
            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Animal Type</label>
            <select name="species_group" class="mt-3 w-full h-14 px-5 rounded-2xl border border-slate-100 bg-slate-50 font-bold">
              <option value="Snakes">Snakes</option>
              <option value="Bees">Bees & Wasps</option>
              <option value="Lizards">Lizards</option>
              <option value="Other">Other / AI Identified</option>
            </select>
          </div>
        </div>

        <!-- Detailed location field -->
        <div>
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Detailed Location (Building, Area)</label>
          <input name="detailed_location" class="mt-3 w-full h-14 px-5 rounded-2xl border border-slate-100 bg-slate-50 font-bold" placeholder="e.g., Library Building, South Lawn">
        </div>

        <!-- Description/notes text area -->
        <div>
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Description of Sighting</label>
          <textarea name="notes" rows="4" class="mt-3 w-full p-6 rounded-3xl border border-slate-100 bg-slate-50 font-bold" placeholder="Color, size, behavior, any distinctive features..."></textarea>
        </div>

        <!-- Photo upload field -->
        <div>
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Photo (if available)</label>
          <div class="mt-3 flex items-center gap-4">
            <input name="photo" type="file" accept="image/*" class="w-full rounded-2xl border border-slate-100 bg-slate-50 p-3" data-photo-input>
          </div>
        </div>

        <!-- Form submission button -->
        <button type="submit" class="w-full bg-[#e60a18] text-white py-5 rounded-2xl font-black uppercase tracking-widest text-sm hover:bg-black">Submit Observation Report</button>
      </form>
    </div>
  </main>

  <!-- Application JavaScript for form handling and interactions -->
  <script src="assets/js/app.js"></script>
</body>
</html>
