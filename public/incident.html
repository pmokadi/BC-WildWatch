<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Emergency Incident | BC Wild Watch</title><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>body{font-family:Inter,sans-serif}</style></head>
<body class="bg-slate-50 text-slate-900">
  <header class="flex items-center justify-between border-b px-6 py-4 lg:px-20 bg-white sticky top-0 z-50"><a href="index.html" class="flex items-center gap-4"><img src="media/images/logo.jpg" class="h-10 w-10 rounded-lg" alt=""><span class="text-xl font-bold">BC Wild Watch</span></a><nav class="hidden md:flex items-center gap-8 text-sm font-medium"><a href="index.html">Home</a><a href="about.html">About</a><a href="sighting.html">Sighting Report</a><a href="incident.html" class="text-[#e60a18]">Incident Report</a><a href="predictor.html">Safety Scanner</a></nav><div class="hidden md:flex items-center gap-4"><a href="contact.html" class="bg-[#e60a18] text-white px-5 py-2 rounded-lg font-bold text-sm">Emergency Alert</a><div data-auth-slot></div></div><button data-menu-toggle class="md:hidden"><i data-lucide="menu"></i></button></header>
  <div data-mobile-menu class="hidden md:hidden bg-white border-b p-6 flex flex-col gap-4 font-bold"><a href="index.html">Home</a><a href="about.html">About</a><a href="sighting.html">Sighting Report</a><a href="incident.html">Incident Report</a><a href="predictor.html">Safety Scanner</a><div data-mobile-auth-slot></div></div>
  <main class="flex justify-center py-12 px-6 lg:px-20">
    <div class="w-full max-w-3xl"><div data-flash hidden></div>
      <div class="bg-black p-8 md:p-12 rounded-lg shadow-2xl mb-12 border-b-8 border-[#e60a18] flex justify-between items-center gap-8"><div><h1 class="text-white text-4xl md:text-5xl font-black uppercase mb-4">Emergency Incident</h1><p class="text-[#e60a18] font-black text-xs uppercase tracking-[0.3em]">Priority One: Immediate Response Required</p></div><div class="w-20 h-20 bg-[#e60a18]/20 border-2 border-[#e60a18] rounded-lg flex items-center justify-center text-[#e60a18]"><i data-lucide="alert-triangle" class="w-10 h-10"></i></div></div>
      <form data-incident-form class="bg-white p-8 md:p-12 rounded-lg border border-slate-200 space-y-8" enctype="multipart/form-data">
        <div class="grid md:grid-cols-2 gap-8">
          <div>
            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Campus Location</label>
            <select name="campus" class="mt-3 w-full h-14 px-5 rounded-2xl border border-slate-100 bg-slate-50 font-bold">
              <option value="Pretoria Campus">Pretoria Campus</option>
              <option value="Kempton Park Campus">Kempton Park Campus</option>
              <option value="Stellenbosch Campus">Stellenbosch Campus</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Building/Area</label>
            <input name="building_area" class="mt-3 w-full h-14 px-5 rounded-2xl border border-slate-100 bg-slate-50 font-bold" placeholder="Specific location">
          </div>
        </div>

        <div>
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Visual Evidence</label>
          <label class="mt-4 w-full h-40 border-4 border-dashed border-slate-100 bg-slate-50 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:border-[#e60a18]"><i data-lucide="camera" class="w-10 h-10 text-slate-300"></i><span class="mt-2 text-xs font-black text-slate-400 uppercase">Attach Media</span><input name="media" type="file" class="hidden"></label>
        </div>

        <div>
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Severity Level</label>
          <div class="mt-4 grid grid-cols-3 gap-4">
            <label class="p-6 rounded-lg border-2 border-slate-100 flex items-center justify-center"><input type="radio" name="urgency" value="High" checked class="mr-2"><span class="font-black text-sm">High</span></label>
            <label class="p-6 rounded-lg border-2 border-slate-100 flex items-center justify-center"><input type="radio" name="urgency" value="Medium" class="mr-2"><span class="font-black text-sm">Medium</span></label>
            <label class="p-6 rounded-lg border-2 border-slate-100 flex items-center justify-center"><input type="radio" name="urgency" value="Low" class="mr-2"><span class="font-black text-sm">Low</span></label>
          </div>
        </div>

        <div>
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Incident Description</label>
          <textarea name="situation_description" rows="5" class="mt-4 w-full p-8 rounded-lg border border-slate-100 bg-slate-50 font-bold" placeholder="What happened? Is anyone injured? What is the threat?" required></textarea>
        </div>

        <div>
          <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Number of People at Risk (if applicable)</label>
          <input name="people_at_risk" type="number" min="0" class="mt-3 w-full h-14 px-5 rounded-2xl border border-slate-100 bg-slate-50 font-bold" placeholder="0">
        </div>

        <div class="flex items-center gap-6">
          <button type="submit" class="flex-1 bg-[#e60a18] text-white py-6 rounded-lg font-black text-lg uppercase tracking-[0.2em] hover:bg-black">Submit Emergency Report</button>
          <button type="button" onclick="document.querySelector('[data-incident-form]').reset()" class="px-6 py-4 rounded-lg border border-slate-200">Cancel</button>
        </div>
      </form>
    </div>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>
